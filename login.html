<!--makes use of share dlayout from the base.html-->
{% extends "base.html" %}

{% block title %}
    Login - Secure Password Manager
{% endblock %}

{% block content %}

    <!--page header-->
    <h1>Login</h1>

    <form method="POST">

        <!--guards the login against CSRF attacks-->
        <input
            type="hidden"
            name="csrf_token"
            value="{{ csrf_token() }}"
        > 

        <label for="username">
            Username
        </label>

        <!--usernamwe input field-->
        <input
            type="text"
            id="username"
            name="username"
            required
        >

        <label for="password">
            Master Password
        </label>

        <!--password input field-->
        <input
            type="password"
            id="password"
            name="password"
            required
        >

        <!--to submit all login details-->
        <button type="submit">
            Login
        </button>

    </form>

    <!--links to registeration page for new users-->
    <p>
        Do not have an account?
        <a href="{{ url_for('register') }}">
            Register here
        </a>
    </p>

    <p>
        <a href="{{ url_for('index') }}">
            Return to Home
        </a>
    </p>

{% endblock %}
