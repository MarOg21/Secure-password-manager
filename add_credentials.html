{% extends "base.html" %}

{% block title %}
    Add Credential - Secure Password Manager
{% endblock %}

{% block content %}

    <h1>Add New Credential</h1>

    <form method="POST">

        <!-- Protects the form against CSRF attacks -->
        <input
            type="hidden"
            name="csrf_token"
            value="{{ csrf_token() }}"
        >

        <label for="site">
            Website or Application
        </label>

        <input
            type="text"
            id="site"
            name="site"
            maxlength="100"
            required
        >

        <label for="site_username">
            Website Username or Email
        </label>

        <input
            type="text"
            id="site_username"
            name="site_username"
            maxlength="150"
            required
        >

        <label for="site_password">
            Website Password
        </label>

        <input
            type="password"
            id="site_password"
            name="site_password"
            required
        >

        <button type="submit">
            Save Credential
        </button>

    </form>

    <p>
        <a href="{{ url_for('generate_password') }}">
            Generate a Secure Password
        </a>
    </p>

    <p>
        <a href="{{ url_for('dashboard') }}">
            Return to Dashboard
        </a>
    </p>

{% endblock %}
